<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" fill="none" role="img" aria-label="FutureLabs">
  <defs>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon: skill-tree node mark (3 branches from center node) -->
  <!-- Root branch (down) -->
  <line x1="24" y1="28" x2="24" y2="40" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
  <circle cx="24" cy="42" r="2.5" fill="#7c3aed" opacity="0.7"/>

  <!-- Left branch -->
  <line x1="24" y1="22" x2="13" y2="32" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>
  <circle cx="11" cy="33.5" r="2.5" fill="#8b5cf6" opacity="0.7"/>

  <!-- Right branch -->
  <line x1="24" y1="22" x2="35" y2="32" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>
  <circle cx="37" cy="33.5" r="2.5" fill="#8b5cf6" opacity="0.7"/>

  <!-- Trunk up to center -->
  <line x1="24" y1="22" x2="24" y2="28" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>

  <!-- Center node (lit up) -->
  <circle cx="24" cy="19" r="5.5" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="24" cy="19" r="3" fill="white" opacity="0.9"/>

  <!-- Top branch (up) -->
  <line x1="24" y1="13.5" x2="24" y2="7" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
  <circle cx="24" cy="5" r="2.5" fill="#a78bfa" opacity="0.8"/>

  <!-- Wordmark: FutureLabs -->
  <text x="56" y="31" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-size="20" font-weight="700" letter-spacing="-0.4" fill="#0f0f0f">Future<tspan fill="#7c3aed">Labs</tspan></text>
</svg>
