<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" role="img" aria-label="FutureLabs mark">
  <defs>
    <linearGradient id="markGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="markGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Root branch (down) -->
  <line x1="24" y1="29" x2="24" y2="41" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="24" cy="43.5" r="3" fill="#7c3aed" opacity="0.7"/>

  <!-- Left branch -->
  <line x1="24" y1="23" x2="12" y2="33" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="9.5" cy="35" r="3" fill="#8b5cf6" opacity="0.7"/>

  <!-- Right branch -->
  <line x1="24" y1="23" x2="36" y2="33" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="38.5" cy="35" r="3" fill="#8b5cf6" opacity="0.7"/>

  <!-- Trunk -->
  <line x1="24" y1="23" x2="24" y2="29" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Center node -->
  <circle cx="24" cy="19" r="7" fill="url(#markGrad)" filter="url(#markGlow)"/>
  <circle cx="24" cy="19" r="3.5" fill="white" opacity="0.95"/>

  <!-- Top branch -->
  <line x1="24" y1="12" x2="24" y2="5" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="24" cy="3" r="3" fill="#a78bfa" opacity="0.8"/>
</svg>
