<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050d1a"/>
      <stop offset="60%" stop-color="#071428"/>
      <stop offset="100%" stop-color="#0c1628"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="glowBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="240" height="240" fill="url(#bg)" rx="16"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#0ea5e9" stroke-width="0.5">
    <line x1="0" y1="40" x2="240" y2="40"/>
    <line x1="0" y1="80" x2="240" y2="80"/>
    <line x1="0" y1="120" x2="240" y2="120"/>
    <line x1="0" y1="160" x2="240" y2="160"/>
    <line x1="0" y1="200" x2="240" y2="200"/>
    <line x1="40" y1="0" x2="40" y2="240"/>
    <line x1="80" y1="0" x2="80" y2="240"/>
    <line x1="120" y1="0" x2="120" y2="240"/>
    <line x1="160" y1="0" x2="160" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="240"/>
  </g>

  <!-- Top-right blue glow -->
  <circle cx="200" cy="40" r="80" fill="url(#glowBlue)" opacity="0.8"/>
  <!-- Bottom-left purple glow -->
  <circle cx="40" cy="200" r="60" fill="#7c3aed" opacity="0.05"/>

  <!-- Tree structure: centered ~cx=120, top of tree ~cy=62 -->

  <!-- Trunk -->
  <line x1="120" y1="88" x2="120" y2="105" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>

  <!-- Root branches (level 1) -->
  <!-- Left branch down -->
  <line x1="120" y1="105" x2="86" y2="125" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right branch down -->
  <line x1="120" y1="105" x2="154" y2="125" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center root -->
  <line x1="120" y1="105" x2="120" y2="128" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Level 2 branches from left -->
  <line x1="86" y1="125" x2="64" y2="142" stroke="#6d28d9" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <line x1="86" y1="125" x2="86" y2="147" stroke="#6d28d9" stroke-width="2" stroke-linecap="round" opacity="0.9"/>

  <!-- Level 2 branches from right -->
  <line x1="154" y1="125" x2="154" y2="147" stroke="#6d28d9" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <line x1="154" y1="125" x2="176" y2="142" stroke="#6d28d9" stroke-width="2" stroke-linecap="round" opacity="0.9"/>

  <!-- Top shoot -->
  <line x1="120" y1="62" x2="120" y2="76" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="120" cy="59" r="4" fill="#a78bfa" opacity="0.7" filter="url(#glow)"/>

  <!-- Center hub node (main) -->
  <circle cx="120" cy="82" r="14" fill="url(#nodeGrad)" filter="url(#softglow)"/>
  <circle cx="120" cy="82" r="7" fill="white" opacity="0.95"/>

  <!-- Level 1 nodes -->
  <circle cx="86" cy="125" r="8" fill="#7c3aed" opacity="0.9" filter="url(#glow)"/>
  <circle cx="86" cy="125" r="4" fill="#c4b5fd" opacity="0.8"/>

  <circle cx="154" cy="125" r="8" fill="#7c3aed" opacity="0.9" filter="url(#glow)"/>
  <circle cx="154" cy="125" r="4" fill="#c4b5fd" opacity="0.8"/>

  <circle cx="120" cy="128" r="6" fill="#6d28d9" opacity="0.8"/>
  <circle cx="120" cy="128" r="3" fill="#ddd6fe" opacity="0.7"/>

  <!-- Level 2 nodes -->
  <circle cx="64" cy="142" r="5" fill="#5b21b6" opacity="0.8"/>
  <circle cx="64" cy="142" r="2.5" fill="#ede9fe" opacity="0.6"/>

  <circle cx="86" cy="147" r="5" fill="#5b21b6" opacity="0.8"/>
  <circle cx="86" cy="147" r="2.5" fill="#ede9fe" opacity="0.6"/>

  <circle cx="154" cy="147" r="5" fill="#5b21b6" opacity="0.8"/>
  <circle cx="154" cy="147" r="2.5" fill="#ede9fe" opacity="0.6"/>

  <circle cx="176" cy="142" r="5" fill="#5b21b6" opacity="0.8"/>
  <circle cx="176" cy="142" r="2.5" fill="#ede9fe" opacity="0.6"/>

  <!-- Blue accent node (right floating) -->
  <circle cx="192" cy="90" r="5" fill="#0ea5e9" opacity="0.5" filter="url(#glow)"/>
  <line x1="176" y1="142" x2="192" y2="90" stroke="#0ea5e9" stroke-width="1" opacity="0.15" stroke-dasharray="3,3"/>

  <!-- "SkillTree" text -->
  <text x="120" y="178" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#ffffff" letter-spacing="-0.5">SkillTree</text>

  <!-- Tagline -->
  <text x="120" y="196" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9.5" font-weight="500" fill="#0ea5e9" letter-spacing="0.5">YOUR AI SKILL COMPANION</text>

  <!-- Bottom decorative line -->
  <line x1="80" y1="207" x2="160" y2="207" stroke="#0ea5e9" stroke-width="0.75" opacity="0.3"/>

  <!-- URL -->
  <text x="120" y="222" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8.5" fill="#475569" letter-spacing="0.3">skilltree.app</text>
</svg>
