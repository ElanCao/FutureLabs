# SkillTree Skill Example: Communication (Soft Skills)
# schema: https://skilltree.futurelab.dev/schemas/v1/skilltree.schema.json

id: communication
name: Communication
branch: soft-skills
parent_skill_id: null
description: >
  Ability to convey ideas clearly and effectively — written, verbal, and
  visual — across audiences ranging from peers to executives and public
  forums. Applies equally to humans and AI agents interacting with users.
icon: "💬"
max_level: 10
agent_compatible: true
community: false
tags: [communication, writing, presentation, collaboration, interpersonal]
prerequisites: []

levels:
  - level: 1
    title: Novice
    behavioral_description: >
      Communicates basic ideas in writing with correct grammar. Participates
      in team meetings without disrupting. Listens and asks clarifying
      questions.
    example_evidence:
      - "Sent a clear email asking for help with a task"
      - "Participated in a standup without prompting"
    xp_threshold: 0

  - level: 2
    title: Beginner
    behavioral_description: >
      Writes structured messages with context, ask, and timeline. Provides
      concise status updates. Summarizes discussions after meetings.
    example_evidence:
      - "Wrote a meeting recap distributed to the team"
      - "Drafted a Slack message with a clear ask and deadline"
    xp_threshold: 100

  - level: 3
    title: Apprentice
    behavioral_description: >
      Tailors message depth to the audience (technical vs. non-technical).
      Writes project proposals or design documents others can act on.
      Handles disagreements constructively in writing.
    example_evidence:
      - "Wrote a design doc reviewed and approved by senior engineers"
      - "Resolved a technical disagreement via async comment thread"
    xp_threshold: 300

  - level: 4
    title: Practitioner
    behavioral_description: >
      Delivers compelling presentations to stakeholders. Structures complex
      information into executive summaries. Facilitates productive meetings.
      Gives and receives actionable feedback.
    example_evidence:
      - "Presented a roadmap proposal to leadership that was approved"
      - "Facilitated a retrospective resulting in 3 shipped process changes"
    xp_threshold: 700

  - level: 5
    title: Competent
    behavioral_description: >
      Drives alignment across teams on ambiguous problems. Communicates
      under pressure (incidents, reorgs). Writes RFCs adopted org-wide.
      Public speaker at internal all-hands or external meetups.
    example_evidence:
      - "Wrote RFC adopted across 3 teams"
      - "Gave a 20-min talk at an internal tech summit"
    xp_threshold: 1400

  - level: 6
    title: Skilled
    behavioral_description: >
      Influences without authority across organizational boundaries. Mentors
      others on communication skills. Writes content (blog, docs) consumed by
      thousands. Navigates politically sensitive topics diplomatically.
    example_evidence:
      - "Authored a blog post with 10k+ reads"
      - "Coached 3+ engineers who improved their promotion packets"
    xp_threshold: 2500

  - level: 7
    title: Advanced
    behavioral_description: >
      Shapes org-wide communication culture (norms, templates, rituals).
      Manages messaging around major company decisions. Coaches executives.
      Represents the company externally at conferences and press events.
    example_evidence:
      - "Established the company's written-culture handbook"
      - "Spoke at a 500+ attendee industry conference"
    xp_threshold: 4000

  - level: 8
    title: Expert
    behavioral_description: >
      Known industry-wide for communication craft. Writing or talks regularly
      cited or shared beyond their own company. Defines communication
      frameworks adopted by other organizations.
    example_evidence:
      - "Blog post shared by 50+ notable industry practitioners"
      - "Created a communication workshop used by 5+ companies"
    xp_threshold: 6000

  - level: 9
    title: Master
    behavioral_description: >
      Globally recognized communicator in their domain. Books, courses, or
      frameworks bearing their name. Advises companies and governments on
      communication strategy.
    example_evidence:
      - "Published a book on communication (5k+ copies sold)"
      - "Keynoted a global conference (1000+ attendees)"
    xp_threshold: 9000

  - level: 10
    title: World-Class
    behavioral_description: >
      Defines how an entire industry or profession communicates. Work is
      required reading or reference in academic and professional settings
      worldwide.
    example_evidence:
      - "Author of the definitive text on professional communication in their field"
    xp_threshold: 15000
