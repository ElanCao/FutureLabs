# SkillTree Skill Example: Python
# schema: https://skilltree.futurelab.dev/schemas/v1/skilltree.schema.json

id: python
name: Python
branch: programming
parent_skill_id: null
description: >
  General-purpose, high-level programming language known for readability
  and versatility. Covers syntax, idioms, standard library, and ecosystem.
icon: "🐍"
max_level: 10
agent_compatible: true
community: false
tags: [python, programming, scripting, backend, data-science, automation]
prerequisites: []

levels:
  - level: 1
    title: Novice
    behavioral_description: >
      Can read and run existing Python scripts. Understands variables, data
      types (int, str, list, dict), and basic control flow (if/for/while).
      Can write a script that reads input and prints output.
    example_evidence:
      - "Completed a Python 'Hello World' tutorial"
      - "Modified an existing script to change output format"
    xp_threshold: 0

  - level: 2
    title: Beginner
    behavioral_description: >
      Writes functions with parameters and return values. Handles exceptions
      with try/except. Reads/writes files. Uses list comprehensions and
      understands mutable vs. immutable types.
    example_evidence:
      - "Built a CLI script that parses a CSV file"
      - "Wrote a function that validates email format with regex"
    xp_threshold: 100

  - level: 3
    title: Apprentice
    behavioral_description: >
      Understands and applies OOP: classes, inheritance, dunder methods.
      Uses modules and packages. Writes unit tests with unittest or pytest.
      Manages dependencies with pip and virtual environments.
    example_evidence:
      - "Built a class hierarchy for a simple domain (e.g., shapes, animals)"
      - "Added pytest tests with >80% coverage to an existing project"
    xp_threshold: 300

  - level: 4
    title: Practitioner
    behavioral_description: >
      Applies Pythonic patterns (context managers, generators, decorators).
      Understands the GIL and basic concurrency (threading, asyncio basics).
      Packages and publishes a library. Profiles and optimizes hot paths.
    example_evidence:
      - "Implemented a context manager for database connections"
      - "Published a package to PyPI"
      - "Replaced a slow loop with a vectorized/generator approach"
    xp_threshold: 700

  - level: 5
    title: Competent
    behavioral_description: >
      Designs multi-module projects with clean architecture. Writes async
      code with asyncio/aiohttp. Builds REST APIs (Flask/FastAPI). Handles
      configuration, logging, and error propagation at scale.
    example_evidence:
      - "Built a production REST API with FastAPI including auth middleware"
      - "Migrated a sync codebase to async for I/O-heavy workloads"
    xp_threshold: 1400

  - level: 6
    title: Skilled
    behavioral_description: >
      Writes C extensions or uses Cython for performance-critical paths.
      Understands CPython internals (bytecode, memory model). Implements
      metaclasses, descriptors, and advanced decorators. Contributes bug
      fixes to open-source Python libraries.
    example_evidence:
      - "Wrote a C extension module for a hot loop"
      - "Merged a PR into a CPython stdlib or major library"
    xp_threshold: 2500

  - level: 7
    title: Advanced
    behavioral_description: >
      Architects large Python codebases (100k+ LOC). Designs plugin systems,
      DSLs, and framework internals. Leads migration across Python versions.
      Benchmarks and tunes the CPython runtime for the specific workload.
    example_evidence:
      - "Designed the plugin architecture for an open-source framework"
      - "Led a Python 2→3 or 3.x→3.y migration for a production service"
    xp_threshold: 4000

  - level: 8
    title: Expert
    behavioral_description: >
      Contributes significant features to CPython or major ecosystem projects.
      Identifies and patches performance regressions in the interpreter.
      Mentors senior engineers. Defines coding standards adopted across
      organizations.
    example_evidence:
      - "Authored a Python Enhancement Proposal (PEP)"
      - "Contributed a new stdlib module or significant optimization"
    xp_threshold: 6000

  - level: 9
    title: Master
    behavioral_description: >
      Deep contributor to CPython core. Designs language features and guides
      community direction. Writes authoritative public content (books, courses)
      used by thousands of engineers.
    example_evidence:
      - "Core CPython committer"
      - "Authored a widely-used Python book or course (10k+ users)"
    xp_threshold: 9000

  - level: 10
    title: World-Class
    behavioral_description: >
      Recognized globally as a Python thought leader. Drives the language
      roadmap. Work defines how millions of developers write Python.
      Keynotes PyCon or equivalent flagship events.
    example_evidence:
      - "Python Steering Council member or BDFL emeritus"
      - "Keynoted PyCon or equivalent conference"
    xp_threshold: 15000

---
# Child skill example: Pandas (parent: python)
id: pandas
name: Pandas
branch: programming
parent_skill_id: python
description: >
  Data manipulation and analysis library for Python. Covers DataFrame
  operations, indexing, groupby, merging, time series, and performance tuning.
icon: "🐼"
max_level: 10
agent_compatible: true
community: false
tags: [python, pandas, data-analysis, dataframes, etl]
prerequisites: [python]

levels:
  - level: 1
    title: Novice
    behavioral_description: >
      Can create a DataFrame from a dict or CSV. Selects columns and rows
      by label. Understands the difference between Series and DataFrame.
    example_evidence:
      - "Loaded a CSV with pd.read_csv() and printed .head()"
    xp_threshold: 0

  - level: 3
    title: Apprentice
    behavioral_description: >
      Filters rows with boolean masks. Groups data with groupby/agg.
      Merges/joins DataFrames. Handles NaN values. Exports to CSV/Excel.
    example_evidence:
      - "Built a sales summary report from raw transaction CSV"
    xp_threshold: 300

  - level: 5
    title: Competent
    behavioral_description: >
      Optimizes memory with dtype selection. Uses vectorized operations
      instead of .apply() loops. Handles multi-index and pivot tables.
      Processes time series with DatetimeIndex.
    example_evidence:
      - "Reduced a 10-minute DataFrame pipeline to under 30 seconds"
    xp_threshold: 1400

  - level: 8
    title: Expert
    behavioral_description: >
      Contributes to pandas core or extension types. Debugs pandas internals.
      Designs and teaches pandas best-practices curricula.
    example_evidence:
      - "Merged a PR to pandas core"
      - "Authored a pandas course with 1k+ students"
    xp_threshold: 6000
